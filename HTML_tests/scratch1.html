<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
/* RESET */
*, *::before, *::after {
  box-sizing: border-box;
}

html, body {
  font-size: 12px;
  font-family: 'Open Sans', sans-serif, helvetica, arial;
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  padding: 0;
}

/* BANNER */
.aims-banner {
  background: #830001;
  background-image: radial-gradient(circle, #ffffff, #830001);
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-size: contain;
  max-height: 85px;
  padding: 5px 0;
}

.aims-banner > .image {
  max-height: 75px;
  width: 800px;
}

/* LAYOUT */
.aims-container {
  width: 100%;
  padding: 0 5vw;
}

.aims-content {
  min-height: calc(100% - 85px);
  margin-bottom: -8.75em;
}

/* BACKGROUND */
.aims-background {
  background: #E1888C;
  background-image: linear-gradient(to bottom, #ffffff, #C7232B);
  background-attachment: fixed;
}

/* FOOTER */
.aims-footer,
.pusher {
  clear: both;
  width: 100%;
  padding: 1em 0;
  height: 8.75em;
  font-size: 12px;
}

.aims-footer hr {
  margin: 1em 0;
  border: 1px dashed #777;
}

.aims-footer p {
  margin: 0;
}

/* UTILITIES */
.text-center {
  text-align: center;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-button {
  background-color: #b71921;
}

::-webkit-scrollbar-track {
  background-color: #b71921;
}

::-webkit-scrollbar-thumb {
  background-color: rgba(255, 255, 255, 0.2);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .aims-banner > .image {
    width: 100%;
  }

  .aims-loginpanel {
    width: 90%;
    float: none;
    margin: 0 auto;
  }

  .aims-container.space-between {
    flex-direction: column;
  }
}

@media (max-width: 480px) {
  .aims-loginpanel {
    width: 100%;
    border-radius: 0;
    box-shadow: none;
    padding: 0.5em 1em;
  }
  html, body {
    height: 100%;
  }
  .aims-content {
    min-height: calc(100vh);
}

  .aims-button {
    min-width: 0;
    width: 48%;
  }
}
    </style>
    <title>enrollment module</title>
</head>
<body>
    <div class="aims-banner">
        <img class="image" src="des_UIPEN.png">
    </div>
    <div class="aims-content aims-container aims-background">
        <br>
        <h1 class="text-center">Enrollment Module</h1>
        <br>
        <div class="aims-loginpanel">

  <!-- HEADER / UNIT COUNTER -->
  <div class="panel-header">
    <h2>Subject Enlistment</h2>
    <div class="unit-counter">
      Units: <span id="currentUnits">0</span> / <span id="maxUnits">24</span>
    </div>
  </div>

  <!-- CROSS PROGRAM SEARCH -->
  <div class="cross-program">
    <label>
      <input type="checkbox" id="crossToggle"> Find subjects in other programs
    </label>
    <input type="text" placeholder="Search subject..." class="search-box">
  </div>

  <!-- SUBJECT TABLE -->
  <table class="enlistment-table">
    <thead>
      <tr>
        <th>Select</th>
        <th>Code</th>
        <th>Description</th>
        <th>Units</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>

      <tr>
        <td><input type="checkbox" class="subject" data-units="3"></td>
        <td>ENG101</td>
        <td>Communication Skills 1</td>
        <td>3</td>
        <td class="open">Available</td>
      </tr>

      <tr class="locked-row">
        <td><input type="checkbox" disabled></td>
        <td>MATH201</td>
        <td>Calculus 1</td>
        <td>4</td>
        <td class="locked">🔒 Prerequisite Required</td>
      </tr>

      <tr>
        <td><input type="checkbox" class="subject" data-units="3"></td>
        <td>CS102</td>
        <td>Programming 2</td>
        <td>3</td>
        <td class="open">Available</td>
      </tr>

    </tbody>
  </table>

  <!-- SPECIAL MODULES -->
  <div class="special-modules">
    <button class="aims-button">Tutorial Class</button>
    <button class="aims-button">Summer Enrollment</button>
  </div>

  <!-- ACTION -->
  <div class="actions text-center">
    <button class="aims-button enroll-btn">Enroll Selected</button>
  </div>

</div>

<style>

/* PANEL */
.aims-loginpanel {
  background: #ffffff;
  max-width: 900px;
  margin: auto;
  padding: 1.5em;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* HEADER */
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1em;
}

.unit-counter {
  background: #830001;
  color: #fff;
  padding: 0.5em 1em;
  border-radius: 5px;
}

/* SEARCH */
.cross-program {
  margin-bottom: 1em;
}

.search-box {
  width: 100%;
  padding: 0.5em;
  margin-top: 0.5em;
}

/* TABLE */
.enlistment-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1em;
}

.enlistment-table th {
  background: #830001;
  color: #fff;
  padding: 0.5em;
}

.enlistment-table td {
  padding: 0.5em;
  border-bottom: 1px solid #ddd;
}

/* STATUS */
.open {
  color: green;
}

.locked {
  color: #830001;
  font-weight: bold;
}

.locked-row {
  background: #f3f3f3;
}

/* BUTTONS */
.aims-button {
  background: #830001;
  color: #fff;
  border: none;
  padding: 0.6em 1.2em;
  margin: 0.5em;
  cursor: pointer;
  border-radius: 5px;
}

.aims-button:hover {
  background: #a80000;
}

/* SPECIAL MODULES */
.special-modules {
  text-align: center;
  margin-bottom: 1em;
}

/* ACTION */
.actions {
  margin-top: 1em;
}

</style>

<script>

// UNIT COUNTER LOGIC (UI VALIDATION PLACEHOLDER)
const checkboxes = document.querySelectorAll('.subject');
const currentUnits = document.getElementById('currentUnits');
const maxUnits = 24;

checkboxes.forEach(cb => {
  cb.addEventListener('change', () => {
    let total = 0;
    checkboxes.forEach(c => {
      if (c.checked) total += parseInt(c.dataset.units);
    });

    currentUnits.textContent = total;

    // UNIT LIMIT INDICATOR
    if (total > maxUnits) {
      currentUnits.style.color = 'red';
    } else {
      currentUnits.style.color = 'white';
    }
  });
});

</script>
        <div class="pusher"></div>
    </div>
    <div class="aims-footer text-center">
        <hr>
        <p>Powered by <img src="logo_AIMS.png" alt="AIMS"> from <img src="logo_Pinnacle.png" alt="Pinnacle Technologies, Inc."></p>
        <p>For questions and comments, email us at</p>
        <p><a href="mailto:web.ers@tup.edu.ph">web.ers@tup.edu.ph</a></p>
    </div>
</body>
</html>
