<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #e8ddc8;
      --dark: #1a1a18;
      --text-sm: clamp(0.7rem, 1.2vw, 0.85rem);
    }

    body {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
    }

    .hero {
      position: relative;
      width: min(900px, 95vw);
      aspect-ratio: 16 / 9;
      background: #111110;
      overflow: hidden;
      border-radius: 4px;
    }

    /* Top bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(12px, 3%, 22px) clamp(14px, 4%, 32px);
      z-index: 10;
    }

    .label {
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      font-size: var(--text-sm);
      color: var(--cream);
      letter-spacing: 0.06em;
      opacity: 0.9;
    }

    .arrow {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cream);
      opacity: 0.85;
    }

    .arrow svg {
      width: clamp(28px, 5vw, 50px);
      height: auto;
    }

    /* Giant PORTFOLIO text */
    .portfolio-text {
      position: absolute;
      bottom: 25%;
      left: 0;
      right: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(80px, 18vw, 175px);
      line-height: 0.82;
      color: var(--cream);
      letter-spacing: -0.01em;
      padding: 0 clamp(10px, 2%, 20px);
      padding-bottom: clamp(28px, 6%, 55px);
      user-select: none;
      display: flex;
      align-items: center;
      justify-self: center;
    }

    /* The outlined "TIF" segment in the middle */
    .text-solid { color: var(--cream); }

    .text-outline {
      color: transparent;
      -webkit-text-stroke: 1.5px var(--cream);
    }

    /* Photo */
    .photo-wrap {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 92%;
      display: flex;
      align-items: flex-end;
      z-index: 5;
    }

    .photo-wrap img {
      height: 100%;
      width: auto;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: contrast(1.04) brightness(0.97);
    }

    /* Subtle gradient overlay to blend photo edges */
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        #111110 0%,
        transparent 15%,
        transparent 85%,
        #111110 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Slight bottom fade to blend photo into text */
    .photo-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22%;
      background: linear-gradient(to top, #111110 0%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: clamp(10px, 2.5%, 22px) clamp(14px, 4%, 32px);
      z-index: 10;
    }

    .bottom-bar .label {
      font-weight: 300;
      font-size: var(--text-sm);
    }

    /* Subtle noise/grain overlay for texture */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Entrance animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-bar   { animation: fadeIn  0.7s ease both; }
    .portfolio-text { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
    .photo-wrap     { animation: fadeIn  1.1s ease 0.2s both; }
    .bottom-bar     { animation: fadeUp  0.7s ease 0.5s both; }
  </style>
</head>
<body>
  <section class="hero">

    <!-- Top bar -->
    <div class="top-bar">
      <span class="label">Creative Presentation</span>
      <div class="arrow">
        <svg viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="6" x2="52" y2="6" stroke="#e8ddc8" stroke-width="1.2"/>
          <polyline points="46,1 56,6 46,11" fill="none" stroke="#e8ddc8" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Big PORTFOLIO text -->
    <div class="portfolio-text" aria-label="Portfolio">
      <span class="text-solid">POR</span><span class="text-outline">TIF</span><span class="text-solid">OLIO</span>
    </div>

    <!-- Model photo -->
    <div class="photo-wrap">
      <img
        src="/Assets/pic2.png"
        alt="Anna Katrina Marchesi"
      />
    </div>

    <!-- Grain texture overlay -->
    <div class="grain"></div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="label">Anna Katrina Marchesi</span>
      <span class="label">www.reallygreatsite.com</span>
    </div>

  </section>
</body>
</html>
