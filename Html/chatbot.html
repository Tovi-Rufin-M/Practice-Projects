<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #c8f04c;
      --accent-dim:#8aab1f;
      --text:      #e8e8e0;
      --muted:     #666;
      --user-bg:   #1e1e1e;
      --bot-bg:    #131a07;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      z-index: 10;
    }
    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--accent); }
      50%      { box-shadow: 0 0 18px var(--accent), 0 0 32px var(--accent-dim); }
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header h1 span { color: var(--accent); }
    .model-tag {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ── CHAT AREA ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      padding: 6px 28px;
      gap: 16px;
      animation: slideUp 0.28s ease-out both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.bot  { background: var(--accent); color: #0d0d0d; }
    .avatar.user { background: var(--border); color: var(--muted); }

    .bubble {
      max-width: min(560px, 78vw);
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.82rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-row.bot  .bubble { background: var(--bot-bg);  border: 1px solid #1e2c08; }
    .message-row.user .bubble { background: var(--user-bg); border: 1px solid var(--border); }

    /* thinking dots */
    .thinking .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: 0.3; }
    .dot:nth-child(1) { animation: blink 1.2s 0.0s ease-in-out infinite; }
    .dot:nth-child(2) { animation: blink 1.2s 0.2s ease-in-out infinite; }
    .dot:nth-child(3) { animation: blink 1.2s 0.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.15} 50%{opacity:1} }

    /* ── EMPTY STATE ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      pointer-events: none;
    }
    #empty .icon { font-size: 2.4rem; opacity: 0.3; }
    #empty p { font-size: 0.78rem; letter-spacing: 0.06em; }
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
      pointer-events: all;
    }
    .sug-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .sug-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── INPUT BAR ── */
    footer {
      padding: 16px 28px 22px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent-dim); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text);
      resize: none;
      max-height: 140px;
      line-height: 1.6;
    }
    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #sendBtn:hover  { background: #d8ff5a; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { background: var(--border); cursor: not-allowed; }
    #sendBtn svg { width: 16px; height: 16px; }

    .footer-note {
      text-align: center;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 0.04em;
    }

    /* ── ERROR ── */
    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      padding: 4px 0 0 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Claude <span>Chat</span></h1>
  <div class="model-tag">gemini-2.0-flash</div>
</header>

<div id="chat">
  <div id="empty">
    <div class="icon">◈</div>
    <p>START A CONVERSATION</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="suggest(this)">Explain quantum computing</button>
      <button class="sug-btn" onclick="suggest(this)">Write a haiku about the ocean</button>
      <button class="sug-btn" onclick="suggest(this)">Debug my Python code</button>
      <button class="sug-btn" onclick="suggest(this)">Plan a 3-day trip to Tokyo</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Message Claude…"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="footer-note">Claude may make mistakes. Verify important information.</p>
</footer>

<script>
  const API_KEY = "AIzaSyCdpDixOcUVnDiAv7jx9OadvCxUWH4EKFk";
  const MODEL = "gemini-2.0-flash-lite";

  const chatEl  = document.getElementById("chat");
  const input   = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const emptyEl = document.getElementById("empty");

  let history = [];   // [{role, content}]
  let busy    = false;

  /* ── Auto-grow textarea ── */
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function suggest(btn) { input.value = btn.textContent; sendMessage(); }

  /* ── Render helpers ── */
  function addRow(role, text) {
    if (emptyEl) emptyEl.style.display = "none";
    const row = document.createElement("div");
    row.className = `message-row ${role}`;
    const av = document.createElement("div");
    av.className = `avatar ${role}`;
    av.textContent = role === "bot" ? "AI" : "YOU";
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.textContent = text;
    row.appendChild(av); row.appendChild(bub);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bub;
  }

  function addThinking() {
    if (emptyEl) emptyEl.style.display = "none";
    const row = document.createElement("div");
    row.className = "message-row bot thinking";
    const av = document.createElement("div");
    av.className = "avatar bot"; av.textContent = "AI";
    const bub = document.createElement("div");
    bub.className = "bubble";
    [1,2,3].forEach(() => { const d = document.createElement("div"); d.className="dot"; bub.appendChild(d); });
    row.appendChild(av); row.appendChild(bub);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return row;
  }

  /* ── Main send ── */
  async function sendMessage() {
    if (busy) return;
    const text = input.value.trim();
    if (!text) return;

    input.value = ""; input.style.height = "auto";
    busy = true; sendBtn.disabled = true;

    addRow("user", text);
    history.push({ role: "user", parts: [{ text }] });

    const thinkRow = addThinking();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: "You are a helpful, honest AI assistant. Be concise but thorough." }] },
            contents: history
          })
        }
      );

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data  = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "(no response)";

      thinkRow.remove();
      addRow("bot", reply);
      history.push({ role: "model", parts: [{ text: reply }] });

    } catch (err) {
      thinkRow.remove();
      const errBub = addRow("bot", `⚠ Error: ${err.message}`);
      errBub.style.color = "#ff6b6b";
      errBub.style.borderColor = "#3a1515";
    }

    busy = false; sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
